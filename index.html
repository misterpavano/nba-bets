<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NBA Bets Daily</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
    :root{--bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2e;--border:#252540;--red:#e63946;--gold:#ffd60a;--blue:#4361ee;--text:#f8f9fa;--muted:#6c757d;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;padding-bottom:80px;}
    header{background:linear-gradient(135deg,#12121e 0%,#1a0a2e 100%);border-bottom:3px solid var(--red);padding:28px 40px;}
    .header-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.3em;color:var(--gold);margin-bottom:8px;}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(40px,7vw,80px);font-weight:900;text-transform:uppercase;line-height:0.9;letter-spacing:-0.01em;}
    h1 .nba{color:var(--red);}
    h1 .bets{color:var(--gold);}
    .header-meta{display:flex;gap:24px;margin-top:16px;align-items:center;flex-wrap:wrap;}
    .badge{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 10px;}
    .date{font-size:13px;color:var(--muted);}
    .container{max-width:900px;margin:0 auto;padding:40px 40px 0;}
    .picks-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.3em;color:var(--red);margin-bottom:20px;display:flex;align-items:center;gap:12px;}
    .picks-label::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--red),transparent);}
    .picks{display:flex;flex-direction:column;gap:16px;margin-bottom:48px;}
    .pick{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--gold);padding:24px;text-decoration:none;color:inherit;display:block;transition:border-color 0.15s,transform 0.15s;}
    .pick:hover{border-color:var(--gold);transform:translateX(4px);}
    .pick-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
    .pick-type{background:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;padding:3px 8px;color:#fff;}
    .pick-confidence{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gold);}
    .pick h3{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,3vw,28px);font-weight:700;text-transform:uppercase;letter-spacing:-0.01em;line-height:1.1;margin-bottom:10px;}
    .pick h3 .line{color:var(--gold);}
    .pick p{font-size:14px;line-height:1.7;color:#bbb;}
    .pick-source{font-size:11px;color:var(--muted);margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
    footer{text-align:center;margin-top:60px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:20px;}
    }
  
    @media(max-width:768px){
      header,.container{padding-left:16px;padding-right:16px;}
      h1{font-size:48px;}
      .pick h3{font-size:20px;}
      .pick{padding:16px;}
      .pick-header{flex-direction:column;gap:8px;}
    }
  </style>
</head>
<body>
  <header>
    <div class="header-eyebrow">Wally's Daily Picks</div>
    <h1><span class="nba">NBA</span> <span class="bets">Bets</span></h1>
    <div class="header-meta">
      <div class="badge">Today's Picks</div>
      <div class="date" id="datestr">Loading...</div>
    </div>
  </header>
  <div class="container">
    <div class="picks-label">Top Picks</div>
    <div class="picks">
      <div class="pick">
        <div class="pick-header">
          <div class="pick-type">Status</div>
        </div>
        <h3>Picks <span class="line">Loading...</span></h3>
        <p>Wally is researching today's games, injury reports, and lines. Check back shortly.</p>
      </div>
    </div>
  </div>
  <footer>NBA Bets Daily &nbsp;·&nbsp; Powered by Wally &nbsp;·&nbsp; Not gambling advice — for entertainment only</footer>
  <script>document.getElementById('datestr').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});</script>
</body>
</html>
